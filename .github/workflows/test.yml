name: QA Automation Suite CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 9 * * 1-5"  # 工作日每天9点自动运行

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install black flake8 isort
      - run: black --check .
        continue-on-error: true
      - run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      - run: isort --check-only --diff .

  test:
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]
        exclude:
          # 减少矩阵规模
          - os: windows-latest
            python-version: "3.9"
          - os: windows-latest
            python-version: "3.10"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[api]

      - name: Run API tests
        run: pytest tests/api/ -v --tb=short

      - name: Run unit tests (no browser)
        run: pytest tests/ -v --tb=short --ignore=tests/web --ignore=tests/functional --ignore=tests/app --ignore=tests/performance

      - name: Generate coverage report
        run: pytest tests/api/ --cov=utils --cov-report=xml --cov-report=html

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.os }}-${{ matrix.python-version }}
          path: htmlcov/

  performance-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .[performance]
      - name: Smoke test Locustfile
        run: python -c "from locust import HttpUser; print('Locust OK')"
