[pytest]
# 最小Python版本
minversion = 6.0

# 测试文件模式
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# 添加命令行选项
addopts = 
    -ra
    --strict-markers
    --tb=short
    --maxfail=5
    --disable-warnings

# 标记定义
markers =
    web: Web自动化测试
    app: App自动化测试
    api: API接口测试
    functional: 功能测试
    performance: 性能测试
    vue: Vue前端测试
    react: React前端测试
    ios: iOS应用测试
    android: Android应用测试
    python: Python后端API
    nodejs: Node.js后端API
    java: Java后端API
    smoke: 冒烟测试
    regression: 回归测试
    slow: 慢速测试
    parametrize: 参数化测试

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(filename)s:%(lineno)d - %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# 测试路径
testpaths = tests

# Python路径
pythonpath = .
